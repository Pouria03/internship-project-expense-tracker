{% extends 'base.html' %}
{% load humanize %}
{% block title %}ویرایش هزینه{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>ویرایش هزینه</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">عنوان</label>
                        <input type="text" name="title" class="form-control" value="{{ expense.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">دسته‌بندی</label>
                        <select name="category" class="form-select" required>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if cat.id == expense.category.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">مقدار/تعداد</label>
                            <input type="number" name="quantity" class="form-control" value="{{ expense.quantity }}" min="1" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">مبلغ (تومان)</label>
                            <input type="number" name="amount" class="form-control" value="{{ expense.amount }}" min="0" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">ارزیابی</label>
                            <select name="evaluation" class="form-select">
                                {% for value, label in evaluation_choices %}
                                    <option value="{{ value }}" {% if value == expense.evaluation %}selected{% endif %}>
                                        {{ label }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">توضیحات</label>
                        <textarea name="description" class="form-control" rows="3">{{ expense.description }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">ذخیره</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
