{% extends 'base.html' %}

{% block title %}ویرایش دسته‌بندی{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card" style="padding: 2rem;">
            <div class="text-center mb-4">
                <h4 style="color: var(--text-primary); font-weight: 700;">ویرایش دسته‌بندی</h4>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="glass-label">نام دسته‌بندی</label>
                    <input type="text" name="name" class="glass-input" style="width: 100%;" value="{{ category.name }}" required>
                </div>
                <button type="submit" class="glass-btn glass-btn-success w-100" style="padding: 0.75rem;">ذخیره</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
