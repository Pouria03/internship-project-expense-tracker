{% extends 'base.html' %}

{% block title %}ثبت‌نام{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header text-center">
                <h4>ثبت‌نام کاربر جدید</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">ثبت‌نام</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'accounts:login' %}">قبلاً ثبت‌نام کرده‌اید؟ ورود</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
